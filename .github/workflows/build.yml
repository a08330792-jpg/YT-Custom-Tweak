name: Build iOS Tweak
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos environment
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -ksL https://github.com/theos/sdks/archive/master.zip -o master.zip
          unzip -q master.zip -d ~/theos/sdks && mv ~/theos/sdks/sdks-master/* ~/theos/sdks/
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Build Tweak Package
        run: |
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTPremiumSelf-Package
          path: .theos/obj/*.dylib
